name: Build and Deploy
on:
  workflow_dispatch:
    inputs:
      runid:
        description: 'runid'
        required: true
jobs:
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
      name: Checkout
    - run: echo The runid ${{ inputs.runid }}
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven
    - name: verify mvn if exist
      run: |
        mvn --version
    - name: Build with Maven
      run: |
        mvn -B package --file pom.xml
        mkdir -p artifacts && cp target/*.jar artifacts/
        cd artifacts && ls
    - name: Save artifact
      uses: actions/upload-artifact@v4
      with:
        name: jarfile
        path: artifacts
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/demo-app:latest
    - name: Deploy to k8s
      run: |
        kubectl apply -f deployment.yml
