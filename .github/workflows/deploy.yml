name: Build and Deploy
on:
  workflow_dispatch:
    inputs:
      runid:
        description: 'runid'
        required: true
jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Echo run ID
      run: echo "The runid is ${{ inputs.runid }}"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven

    - name: Verify Maven
      run: mvn --version

    - name: Build with Maven
      run: |
        mvn -B package --file pom.xml
        mkdir -p artifacts && cp target/*.jar artifacts/
        ls artifacts/

    - name: Save artifact
      uses: actions/upload-artifact@v4
      with:
        name: jarfile
        path: artifacts

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:latest

    - name: Deploy to k8s
      run: kubectl apply -f deployment.yml
